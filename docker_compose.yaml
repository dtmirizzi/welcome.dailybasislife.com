version: '3.8'

services:
  app:
    image: node:20-alpine
    container_name: dailybasis-tracker
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm run dev"
    environment:
      - NODE_ENV=development
    stdin_open: true
    tty: true
